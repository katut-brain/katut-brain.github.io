<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>思考ネットワーク</title>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #fafafa; --panel: #ffffff; --ink: #1c1c1e; --sub: #8a8a8e;
    --line: #e3e3e6; --chip: #f1f1f3; --accent: #1e88c7;
    --node-concept: #7b8190; --node-capture: #b2b7c0; --node-new: #29b6f6;
    --node-hi: #2c3038; --edge: #c9c9cf;
    --shadow: 0 1px 12px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --panel: #161922; --ink: #e8e8ea; --sub: #8b91a0;
      --line: #2b3140; --chip: #1e2230; --accent: #5ec8f9;
      --node-concept: #c2c8d3; --node-capture: #727a8a; --node-new: #5ec8f9;
      --node-hi: #ffffff; --edge: #3a4150;
      --shadow: 0 2px 16px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 20px 16px 48px; }
  h1 { margin: 0; font-size: 22px; letter-spacing: .01em; font-weight: 700; }
  .tagline { color: var(--sub); font-size: 13px; margin-top: 3px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip { background: var(--chip); color: var(--sub); border-radius: 999px; padding: 4px 10px; font-size: 12px; }
  #net { height: 70vh; min-height: 440px; background: var(--bg);
    border: 1px solid var(--line); border-radius: 14px; margin-top: 14px; box-shadow: var(--shadow); }
  .hint { color: var(--sub); font-size: 11px; margin-top: 8px; text-align: center; }
  #err { display: none; padding: 20px; color: #d05; font-size: 14px; }
  h2 { font-size: 15px; margin: 34px 0 10px; font-weight: 700; }
  .reviews { display: grid; gap: 10px; }
  .card { display: block; text-decoration: none; color: inherit; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; transition: border-color .15s, transform .15s; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .date { font-weight: 700; font-size: 15px; }
  .card .sub { color: var(--sub); font-size: 12.5px; margin-top: 4px; }
  footer { color: var(--sub); font-size: 11px; margin-top: 36px; text-align: center; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>思考ネットワーク</h1>
  <div class="tagline">見たもの・読んだものから浮かぶ、関心のかたち</div>

  <div class="chips">
    <span class="chip" id="chip-updated">最終更新 —</span>
    <span class="chip" id="chip-count">キャプチャ —</span>
    <span class="chip">ドラッグ / ピンチでズーム</span>
  </div>

  <div id="net"></div>
  <div id="err">⚠️ ネットワークを読み込めませんでした。再読み込みしてください。</div>
  <div class="hint">ノードに触れると、つながりだけが浮かびます ／ キャプチャ（小さい円）をクリックすると元の投稿・記事が開きます ／ 水色＝最近追加</div>

  <h2>最近の振り返り</h2>
  <div class="reviews">
    <a class="card" href="reviews/2026-06-12.html">
      <div class="date">2026-06-12 の振り返り</div>
      <div class="sub">建築言説・AIアート・アーカイブの4件 ／ 「観て書く」「収集→継承」 ／ curator-maker志向</div>
    </a>
  </div>

  <footer>毎朝の振り返りから育つ地図 ｜ katut-brain</footer>
</div>

<script>
const root = document.documentElement;
function cssVar(n){ return getComputedStyle(root).getPropertyValue(n).trim(); }

if (typeof vis === "undefined" || typeof window.GRAPH === "undefined") {
  document.getElementById("net").style.display = "none";
  document.getElementById("err").style.display = "block";
} else {
  const G = window.GRAPH;
  const rawNodes = G.nodes, rawEdges = G.edges, clusters = G.clusters;
  document.getElementById("chip-updated").textContent = "最終更新 " + G.updated;
  document.getElementById("chip-count").textContent = "キャプチャ " + (G.count || rawNodes.filter(n=>n.kind==="capture").length) + "件";

  const nodes = new vis.DataSet(rawNodes.map(n => ({ ...n, value: n.value != null ? n.value : (n.kind === "concept" ? 16 : 9) })));
  const edges = new vis.DataSet(rawEdges.map((e, i) => ({ id: "e"+i, ...e })));

  function fillOf(n){ return n.new ? cssVar("--node-new") : n.kind === "concept" ? cssVar("--node-concept") : cssVar("--node-capture"); }
  function paint(){
    nodes.update(rawNodes.map(n => ({ id: n.id, color: {
      background: fillOf(n), border: fillOf(n),
      highlight: { background: cssVar("--node-hi"), border: cssVar("--node-hi") } } })));
    net.setOptions({ nodes: { font: { color: cssVar("--ink") } },
                     edges: { color: { color: cssVar("--edge"), highlight: cssVar("--sub"), opacity: .65 } } });
    net.redraw();
  }

  const options = {
    nodes: { shape: "dot", borderWidth: 0,
      scaling: { min: 7, max: 30, label: { min: 11, max: 19, drawThreshold: 9 } },
      font: { face: "Segoe UI, Hiragino Sans, sans-serif", strokeWidth: 0 } },
    edges: { width: 1, smooth: false, font: { size: 11, color: "#9a9aa2", strokeWidth: 0 } },
    physics: { solver: "barnesHut",
      barnesHut: { gravitationalConstant: -3000, centralGravity: 0.25, springLength: 95, springConstant: 0.04, damping: 0.4, avoidOverlap: 0.1 },
      stabilization: { iterations: 400 } },
    interaction: { hover: true, tooltipDelay: 120 },
  };
  const net = new vis.Network(document.getElementById("net"), { nodes, edges }, options);
  window._net = net;

  net.on("beforeDrawing", ctx => {
    const pos = net.getPositions();
    for (const key in clusters) {
      const c = clusters[key];
      const pts = c.ids.map(id => pos[id]).filter(Boolean);
      if (!pts.length) continue;
      const R = 95;
      pts.forEach(p => {
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, R);
        g.addColorStop(0, "rgba(" + c.rgb + ",0.13)");
        g.addColorStop(1, "rgba(" + c.rgb + ",0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI*2); ctx.fill();
      });
      let cx = 0, minY = Infinity;
      pts.forEach(p => { cx += p.x; minY = Math.min(minY, p.y); });
      cx /= pts.length;
      ctx.fillStyle = "rgba(" + c.rgb + ",0.7)";
      ctx.font = "13px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(c.name, cx, minY - 70);
      ctx.textAlign = "left";
    }
  });

  paint();
  net.once("stabilizationIterationsDone", () => { net.setOptions({ physics: false }); net.fit({ animation: true }); });

  const mq = window.matchMedia("(prefers-color-scheme: dark)");
  mq.addEventListener ? mq.addEventListener("change", paint) : mq.addListener(paint);

  const allNodeIds = rawNodes.map(n => n.id);
  function focus(id){
    const keep = new Set([id, ...net.getConnectedNodes(id)]);
    nodes.update(allNodeIds.map(nid => ({ id: nid, opacity: keep.has(nid) ? 1 : 0.1 })));
    edges.update(rawEdges.map((e,i)=> ({ id: "e"+i,
      color: (e.from===id||e.to===id) ? { color: cssVar("--sub"), opacity: 1 } : { color: cssVar("--edge"), opacity: 0.05 } })));
  }
  function clear(){
    nodes.update(allNodeIds.map(nid => ({ id: nid, opacity: 1 })));
    edges.update(rawEdges.map((e,i)=> ({ id: "e"+i, color: { color: cssVar("--edge"), opacity: .65 } })));
  }
  net.on("hoverNode", p => focus(p.node));
  net.on("blurNode", clear);
  net.on("click", p => {
    if (!p.nodes.length) return;
    const n = rawNodes.find(x => x.id === p.nodes[0]);
    if (n && n.url) window.open(n.url, "_blank", "noopener");
  });
}
</script>
</body>
</html>
