<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>思考ネットワーク</title>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  :root {
    --bg: #fafafa; --panel: #ffffff; --ink: #1c1c1e; --sub: #8a8a8e;
    --line: #ececec; --chip: #f1f1f3; --accent: #1e88c7;
    --node: #5b616e; --node-hi: #2c3038; --edge: #c9c9cf;
  }
  html[data-theme="dark"] {
    --bg: #0f1115; --panel: #161922; --ink: #e8e8ea; --sub: #8b91a0;
    --line: #262b36; --chip: #1e2230; --accent: #5ec8f9;
    --node: #aab1bd; --node-hi: #ffffff; --edge: #3a4150;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; transition: background .25s, color .25s; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 20px 16px 48px; }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { margin: 0; font-size: 22px; letter-spacing: .01em; font-weight: 700; }
  .tagline { color: var(--sub); font-size: 13px; margin-top: 3px; }
  .theme-btn { flex: none; border: 1px solid var(--line); background: var(--panel);
    color: var(--ink); border-radius: 999px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
  .theme-btn:hover { border-color: var(--sub); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip { background: var(--chip); color: var(--sub); border-radius: 999px;
    padding: 4px 10px; font-size: 12px; }
  #net { height: 66vh; min-height: 420px; background: var(--bg);
    border: 1px solid var(--line); border-radius: 14px; margin-top: 14px; }
  .hint { color: var(--sub); font-size: 11px; margin-top: 8px; text-align: center; }
  #err { display: none; padding: 20px; color: #d05; font-size: 14px; }
  h2 { font-size: 15px; margin: 34px 0 10px; font-weight: 700; }
  .reviews { display: grid; gap: 10px; }
  .card { display: block; text-decoration: none; color: inherit; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; transition: border-color .15s, transform .15s; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .date { font-weight: 700; font-size: 15px; }
  .card .sub { color: var(--sub); font-size: 12.5px; margin-top: 4px; }
  footer { color: var(--sub); font-size: 11px; margin-top: 36px; text-align: center; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>思考ネットワーク</h1>
      <div class="tagline">見たもの・読んだものから浮かぶ、関心のかたち</div>
    </div>
    <button class="theme-btn" id="themeBtn" type="button">🌙 ダーク</button>
  </div>

  <div class="chips">
    <span class="chip" id="chip-updated">最終更新 2026-06-12</span>
    <span class="chip" id="chip-count">キャプチャ 4件</span>
    <span class="chip">ドラッグ / ピンチでズーム</span>
  </div>

  <div id="net"></div>
  <div id="err">⚠️ ネットワーク描画ライブラリを読み込めませんでした。再読み込みしてください。</div>
  <div class="hint">ノードに触れると、つながりだけが浮かびます ／ キャプチャ（小さい円）をクリックすると元の投稿・記事が開きます</div>

  <h2>最近の振り返り</h2>
  <div class="reviews" id="reviews">
    <a class="card" href="reviews/2026-06-12.html">
      <div class="date">2026-06-12 の振り返り</div>
      <div class="sub">建築言説・AIアート・アーカイブの4件 ／ 「観て書く」「収集→継承」 ／ curator-maker志向</div>
    </a>
  </div>

  <footer>毎朝の振り返りから育つ地図 ｜ katut-brain</footer>
</div>

<script>
const root = document.documentElement, tbtn = document.getElementById("themeBtn");
function cssVar(n){ return getComputedStyle(root).getPropertyValue(n).trim(); }
function styleNet(){
  if (!window._net) return;
  window._net.setOptions({
    nodes: { color: { background: cssVar("--node"), border: cssVar("--node"),
                      highlight: { background: cssVar("--node-hi"), border: cssVar("--node-hi") } },
             font: { color: cssVar("--ink") } },
    edges: { color: { color: cssVar("--edge"), highlight: cssVar("--sub"), opacity: 0.7 } },
  });
  window._net.redraw();
}
function applyTheme(t){ root.setAttribute("data-theme", t); tbtn.textContent = t==="dark" ? "☀️ ライト" : "🌙 ダーク";
  try{ localStorage.setItem("tn-theme", t); }catch(e){} styleNet(); }
applyTheme((()=>{ try{ return localStorage.getItem("tn-theme") || "light"; }catch(e){ return "light"; } })());
tbtn.addEventListener("click", ()=> applyTheme(root.getAttribute("data-theme")==="dark" ? "light" : "dark"));

// ── データ（公開反映時に再生成） ──
const rawNodes = [
  { id: "core",    label: "curator-maker\ntaste",      kind: "concept" },
  { id: "arch",    label: "建築",                       kind: "concept" },
  { id: "exh",     label: "展覧会",                     kind: "concept" },
  { id: "crit",    label: "言説・批評",                 kind: "concept" },
  { id: "cur",     label: "キュレーション",             kind: "concept" },
  { id: "archive", label: "アーカイブ\n収集・継承",     kind: "concept" },
  { id: "ai",      label: "AI×表現",                    kind: "concept" },
  { id: "fashion", label: "ファッション",               kind: "concept" },
  { id: "c0", label: "Under35 建築家展",         kind: "capture", url: "https://u35.aaf.ac/" },
  { id: "c1", label: "布施・磯崎新論",           kind: "capture", url: "https://x.com/rintarofuse/status/2065395890186269162" },
  { id: "c2", label: "nova / divine simulation", kind: "capture", url: "https://www.instagram.com/p/DYjibZlIqMx/" },
  { id: "c3", label: "マルジェラ アーカイブ展",  kind: "capture", url: "https://www.instagram.com/p/DZBlUTZjzqR/" },
];
const rawEdges = [
  { from: "c0", to: "arch" }, { from: "c0", to: "exh" },
  { from: "c1", to: "arch" }, { from: "c1", to: "crit" }, { from: "c1", to: "exh" },
  { from: "c2", to: "ai" },   { from: "c2", to: "cur" },
  { from: "c3", to: "archive" }, { from: "c3", to: "fashion" }, { from: "c3", to: "cur" },
  { from: "core", to: "crit" }, { from: "core", to: "cur" }, { from: "core", to: "archive" },
  { from: "exh", to: "crit",     label: "観て書く",   dashes: true },
  { from: "ai",  to: "archive",  label: "蓄積・継承", dashes: true },
];

if (typeof vis === "undefined") {
  document.getElementById("net").style.display = "none";
  document.getElementById("err").style.display = "block";
} else {
  const nodes = new vis.DataSet(rawNodes.map(n => ({
    ...n,
    value: n.kind === "concept" ? (n.id === "core" ? 24 : 16) : 9,
  })));
  const edges = new vis.DataSet(rawEdges.map((e, i) => ({ id: "e"+i, ...e })));

  const options = {
    nodes: { shape: "dot", borderWidth: 0,
      scaling: { min: 9, max: 30, label: { min: 12, max: 18 } },
      font: { face: "Segoe UI, Hiragino Sans, sans-serif", strokeWidth: 0 } },
    edges: { width: 1, smooth: false,
      font: { size: 11, color: "#9a9aa2", strokeWidth: 0 } },
    physics: { solver: "barnesHut",
      barnesHut: { gravitationalConstant: -4200, springLength: 135, springConstant: 0.045, avoidOverlap: 0.4 },
      stabilization: { iterations: 250 } },
    interaction: { hover: true, tooltipDelay: 120 },
  };
  const net = new vis.Network(document.getElementById("net"), { nodes, edges }, options);
  window._net = net;
  styleNet();
  net.once("stabilizationIterationsDone", () => { net.setOptions({ physics: false }); net.fit({ animation: true }); });

  const allNodeIds = rawNodes.map(n => n.id);
  function focus(id){
    const keep = new Set([id, ...net.getConnectedNodes(id)]);
    nodes.update(allNodeIds.map(nid => ({ id: nid, opacity: keep.has(nid) ? 1 : 0.12 })));
    edges.update(rawEdges.map((e,i)=> ({ id: "e"+i,
      color: (e.from===id||e.to===id) ? { color: cssVar("--sub"), opacity: 1 } : { color: cssVar("--edge"), opacity: 0.08 } })));
  }
  function clear(){
    nodes.update(allNodeIds.map(nid => ({ id: nid, opacity: 1 })));
    edges.update(rawEdges.map((e,i)=> ({ id: "e"+i, color: { color: cssVar("--edge"), opacity: 0.7 } })));
  }
  net.on("hoverNode", p => focus(p.node));
  net.on("blurNode", clear);
  net.on("click", p => {
    if (!p.nodes.length) return;
    const n = rawNodes.find(x => x.id === p.nodes[0]);
    if (n && n.url) window.open(n.url, "_blank", "noopener");
  });
}
</script>
</body>
</html>
